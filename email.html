<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By MISSA</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f4f4f4;
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  align-items: center;
  text-align: center;
  color: #111;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  max-width: 500px;
  padding: 20px;
}

.logo {
  width: 140px;
  margin-bottom: 10px;
}

.brand {
  font-family: 'Playfair Display', serif;
  letter-spacing: 3px;
  font-size: 16px;
  margin-bottom: 40px;
}

.tagline {
  font-size: 18px;
  margin-bottom: 30px;
  line-height: 1.5;
}

.form-wrapper {
  display: flex;
  width: 100%;
  max-width: 400px;
}

input {
  flex: 1;
  padding: 14px;
  border: 1px solid #000;
  border-right: none;
  font-size: 14px;
  outline: none;
  background: white;
}

button {
  padding: 14px 20px;
  background: black;
  color: white;
  border: 1px solid black;
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 1px;
}

button:hover {
  opacity: 0.9;
}

.login {
  margin-top: 20px;
  font-size: 14px;
  color: #333;
  cursor: pointer;
}

.footer {
  padding: 30px;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

  <!-- Replace with your logo -->
  <img src="logo.png" class="logo" alt="Logo">

  <div class="brand">BY MISSA</div>

  <div class="tagline">
    Signup for our newsletter and get updated when we launch our site!
  </div>

  <form id="emailForm" class="form-wrapper">
    <input type="email" id="email" placeholder="EMAIL ADDRESS" required>
    <button type="submit">SUBMIT</button>
  </form>

  <div class="login">🔒 Login with Password</div>

</div>

<div class="footer">
  This Store will be powered by Shopify
</div>

<script>
const scriptURL = "YOUR_GOOGLE_SCRIPT_URL";
const form = document.getElementById("emailForm");

form.addEventListener("submit", e => {
  e.preventDefault();

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      email: document.getElementById("email").value
    })
  })
  .then(() => {
    alert("You're on the list!");
    form.reset();
  })
  .catch(() => alert("Something went wrong"));
});
</script>

</body>
</html>

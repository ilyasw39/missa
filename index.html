<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By MISSA</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f6f1e8;
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  align-items: center;
  text-align: center;
  color: #1a1a1a;
  position: relative;
  overflow-x: hidden;
}

/* Stronger but still elegant prayer arch pattern */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='400' height='600' viewBox='0 0 400 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M200 0 Q330 250 200 500 Q70 250 200 0 Z' fill='none' stroke='%231a1a1a' stroke-opacity='0.08' stroke-width='2'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 360px 540px;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  max-width: 500px;
  padding: 50px 20px;
}

.logo {
  width: 170px;
  margin-bottom: 25px;
}

.brand {
  font-family: 'Playfair Display', serif;
  letter-spacing: 6px;
  font-size: 24px;
  margin-bottom: 55px;
}

.tagline {
  font-size: 18px;
  margin-bottom: 35px;
  line-height: 1.6;
  max-width: 420px;
}

.form-wrapper {
  display: flex;
  width: 100%;
  max-width: 420px;
}

input {
  flex: 1;
  padding: 15px;
  border: 1px solid #1a1a1a;
  border-right: none;
  font-size: 13px;
  letter-spacing: 1px;
  background: #ffffff; /* solid white like you wanted */
  outline: none;
}

button {
  padding: 15px 24px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #1a1a1a;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 0.3s ease;
}

button:hover {
  opacity: 0.85;
}

.footer {
  padding: 35px;
  font-size: 14px;
  color: #666;
  position: relative;
  z-index: 1;
}

.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(3px);
  display: none;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: 999;
}

.popup-content {
  background: #ffffff;
  padding: 30px 40px;
  border-radius: 8px;
  font-size: 16px;
  max-width: 300px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.popup.show {
  display: flex;
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

  <!-- Replace with your logo -->
  <img src="logo.png" class="logo" alt="Logo">

  <div class="brand">BY MISSA</div>

  <div class="tagline">
    Signup for our newsletter and get updated when we launch our site!
  </div>

  <form id="emailForm" class="form-wrapper">
    <input type="email" id="email" placeholder="EMAIL ADDRESS" required>
    <input type="text" id="website" style="display:none">
    <button type="submit">SUBMIT</button>
  </form>

  <p style="font-size:12px; margin-top:12px; color:#666;">
    By subscribing, you agree to receive updates from Missa.
  </p>

</div>

<div class="footer">
  Launching Soon Insha`Allah
</div>

<div id="popup" class="popup">
  <div class="popup-content">
    <p id="popup-message"></p>
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyNu9_BvCuEoAxxp3HuAsZIBIrl6-ppi3XiVvKeCALlTwCeQYRcivMkto0pPkoSeRqw0Q/exec";
const form = document.getElementById("emailForm");
const button = form.querySelector("button");

form.addEventListener("submit", e => {
  e.preventDefault();

  // Honeypot spam protection
  if (document.getElementById("website").value !== "") return;

  button.disabled = true;
  button.textContent = "Submitting...";

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      email: document.getElementById("email").value
    })
  })
  .then(res => res.json())
  .then(data => {
    const popup = document.getElementById("popup");
    const message = document.getElementById("popup-message");

    if (data.result === "duplicate") {
      message.textContent = "You're already on the list ✨";
    } else if (data.result === "success") {
      message.textContent = "You're on the list ✨";
    } else {
      message.textContent = "Something went wrong";
    }

    popup.classList.add("show");
    form.reset();
    button.disabled = false;
    button.textContent = "SUBMIT";

    setTimeout(() => {
      popup.classList.remove("show");
    }, 2500);
  })
  .catch(() => {
  const popup = document.getElementById("popup");
  const message = document.getElementById("popup-message");

  message.textContent = "Something went wrong. Please try again.";
  popup.classList.add("show");
  button.disabled = false;
  button.textContent = "SUBMIT";

  setTimeout(() => {
    popup.classList.remove("show");
  }, 2500);
});
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By MISSA</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f6f1e8;
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  align-items: center;
  text-align: center;
  color: #1a1a1a;
  position: relative;
  overflow-x: hidden;
}

/* Stronger but still elegant prayer arch pattern */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='400' height='600' viewBox='0 0 400 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M200 0 Q330 250 200 500 Q70 250 200 0 Z' fill='none' stroke='%231a1a1a' stroke-opacity='0.08' stroke-width='2'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 360px 540px;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  max-width: 500px;
  padding: 50px 20px;
}

.logo {
  width: 170px;
  margin-bottom: 25px;
}

.brand {
  font-family: 'Playfair Display', serif;
  letter-spacing: 6px;
  font-size: 24px;
  margin-bottom: 55px;
}

.tagline {
  font-size: 18px;
  margin-bottom: 35px;
  line-height: 1.6;
  max-width: 420px;
}

.form-wrapper {
  display: flex;
  width: 100%;
  max-width: 420px;
}

input {
  flex: 1;
  padding: 15px;
  border: 1px solid #1a1a1a;
  border-right: none;
  font-size: 13px;
  letter-spacing: 1px;
  background: #ffffff; /* solid white like you wanted */
  outline: none;
}

button {
  padding: 15px 24px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #1a1a1a;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 0.3s ease;
}

button:hover {
  opacity: 0.85;
}

.login {
  margin-top: 25px;
  font-size: 14px;
  color: #444;
  cursor: pointer;
}

.footer {
  padding: 35px;
  font-size: 14px;
  color: #666;
  position: relative;
  z-index: 1;
}
</style>
</head>

<body>

<div class="container">

  <!-- Replace with your logo -->
  <img src="logo.png" class="logo" alt="Logo">

  <div class="brand">BY MISSA</div>

  <div class="tagline">
    Signup for our newsletter and get updated when we launch our site!
  </div>

  <form id="emailForm" class="form-wrapper">
    <input type="email" id="email" placeholder="EMAIL ADDRESS" required>
    <button type="submit">SUBMIT</button>
  </form>

  <div class="login">🔒 Login with Password</div>

</div>

<div class="footer">
  This Store will be powered by Shopify
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyNu9_BvCuEoAxxp3HuAsZIBIrl6-ppi3XiVvKeCALlTwCeQYRcivMkto0pPkoSeRqw0Q/exec";
const form = document.getElementById("emailForm");

form.addEventListener("submit", e => {
  e.preventDefault();

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      email: document.getElementById("email").value
    })
  })
  .then(() => {
    alert("You're on the list!");
    form.reset();
  })
  .catch(() => alert("Something went wrong"));
});
</script>

</body>
</html>
